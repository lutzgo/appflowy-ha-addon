# =============================================================================
# AppFlowy Cloud – Nginx reverse proxy configuration
# Listens on port 8087 (exposed by the HA add-on).
#
# Upstreams (all on localhost inside the single container):
#   :8000  AppFlowy Cloud API
#   :9999  GoTrue auth
#   :3000  Admin Frontend
#   :9000  MinIO S3 API
# =============================================================================

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # CORS: allow AppFlowy clients connecting from known origins.
    # Extend this map if you access AppFlowy Web from a different origin.
    map $http_origin $cors_origin {
        "~^http://localhost(:[0-9]+)?$"  $http_origin;
        default                          "null";
    }

    server {
        listen      8087;
        server_name _;

        client_max_body_size 10M;
        underscores_in_headers on;

        # ── Backend addresses ────────────────────────────────────────────────
        set $appflowy_backend  "http://127.0.0.1:8000";
        set $gotrue_backend    "http://127.0.0.1:9999";
        set $admin_backend     "http://127.0.0.1:3000";
        set $minio_api_backend "http://127.0.0.1:9000";
        # Internal host header for MinIO presigned URLs
        set $minio_internal    "localhost:9000";

        # ── GoTrue auth ──────────────────────────────────────────────────────
        location /gotrue/ {
            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true'       always;
                add_header 'Access-Control-Allow-Headers'     '*'          always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Max-Age'           3600         always;
                add_header 'Content-Type'                     'text/plain charset=UTF-8' always;
                add_header 'Content-Length'                   0            always;
                return 204;
            }

            proxy_pass $gotrue_backend;
            rewrite ^/gotrue(/.*)$ $1 break;

            proxy_set_header Host               $http_host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_pass_request_headers on;
        }

        # ── WebSocket (real-time collaboration) ──────────────────────────────
        location /ws {
            proxy_pass $appflowy_backend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_read_timeout 86400s;
        }

        # ── AppFlowy Cloud API ────────────────────────────────────────────────
        location /api {
            proxy_pass $appflowy_backend;

            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Host         $http_host;

            # CORS
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Client-Version, Device-Id' always;
                add_header 'Access-Control-Max-Age'       3600 always;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Client-Version, Device-Id' always;

            # Large publish endpoint
            location ~* ^/api/workspace/([a-zA-Z0-9_-]+)/publish$ {
                proxy_pass $appflowy_backend;
                proxy_request_buffering off;
                client_max_body_size 256M;
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Client-Version, Device-Id' always;
                if ($request_method = 'OPTIONS') {
                    add_header 'Access-Control-Max-Age' 3600 always;
                    return 204;
                }
            }

            # Streaming AI chat
            location /api/chat {
                proxy_pass $appflowy_backend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                chunked_transfer_encoding on;
                proxy_buffering  off;
                proxy_cache      off;
                proxy_read_timeout    600s;
                proxy_connect_timeout 600s;
                proxy_send_timeout    600s;
            }

            # Large file import
            location /api/import {
                proxy_pass $appflowy_backend;
                proxy_set_header X-Request-Id $request_id;
                proxy_set_header Host         $http_host;
                proxy_request_buffering off;
                proxy_buffering  off;
                proxy_cache      off;
                client_max_body_size 2G;
                proxy_read_timeout    600s;
                proxy_connect_timeout 600s;
                proxy_send_timeout    600s;
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Device-Id' always;
            }
        }

        # ── MinIO S3 API (for presigned URL access) ───────────────────────────
        location /minio-api/ {
            proxy_pass $minio_api_backend;

            # Presigned URLs are signed against the internal host:port –
            # keep that header so MinIO validates the signature correctly.
            proxy_set_header Host              $minio_internal;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            rewrite ^/minio-api/(.*) /$1 break;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
            proxy_connect_timeout 300s;
        }

        # ── Admin Frontend ────────────────────────────────────────────────────
        location /console {
            proxy_pass $admin_backend;

            proxy_set_header X-Scheme $scheme;
            proxy_set_header Host     $host;
        }

        # ── Root: redirect to admin console ──────────────────────────────────
        location = / {
            return 302 /console;
        }

        # ── Deny hidden files ─────────────────────────────────────────────────
        location ~ /\. {
            deny all;
        }
    }
}
